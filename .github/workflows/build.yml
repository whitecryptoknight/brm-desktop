name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build Windows installer
        run: npm run build:win
        env:
          VITE_BRM_API_URL: ${{ secrets.BRM_API_URL }}
          VITE_SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN }}
          VITE_SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          # Skip code signing — no cert configured
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build macOS DMG
        run: npm run build:mac
        env:
          VITE_BRM_API_URL: ${{ secrets.BRM_API_URL }}
          VITE_SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN }}
          VITE_SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          # Skip code signing — no cert configured
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/*.dmg
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    # Only runs when a version tag is pushed
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: artifacts/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
